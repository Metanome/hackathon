<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 280 110" role="img">
  <title>Esnaf Tezgahi Logo</title>
  <style>
    .wm  { font-family: Georgia, 'Times New Roman', serif; }
    .sub { font-family: system-ui, sans-serif; }
    .kavanoz { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
    .sise    { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.22s both; }
    .kutu    { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.34s both; }
    .kese    { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.46s both; }
    .tezgah  { animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) 0s both; }
    .word1   { animation: fadeIn 0.5s ease 0.55s both; }
    .word2   { animation: fadeIn 0.5s ease 0.65s both; }
    .badge   { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.5s both; }
    .pulser  { animation: pulse 2.5s ease-in-out 1s infinite; }
    @keyframes popIn {
      from { opacity:0; transform:scaleY(0); transform-origin:bottom; }
      to   { opacity:1; transform:scaleY(1); transform-origin:bottom; }
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity:.9; }
      50%      { opacity:.3; }
    }
  </style>

  <!-- Tezgah -->
  <g class="tezgah">
    <path d="M8 56 L192 56 L202 66 L0 66 Z" fill="#3B6D11"/>
    <path d="M192 56 L202 66 L202 82 L192 72 Z" fill="#1E4A08"/>
    <path d="M0 66 L202 66 L202 82 L0 82 Z" fill="#2C5A0E" opacity="0.5"/>
    <rect x="6" y="72" width="8" height="18" rx="3" fill="#1E4A08"/>
    <rect x="186" y="64" width="8" height="26" rx="3" fill="#1E4A08"/>
  </g>

  <!-- Kavanoz -->
  <g class="kavanoz">
    <ellipse cx="40" cy="50" rx="16" ry="6" fill="#639922"/>
    <rect x="24" y="24" width="32" height="26" rx="5" fill="#97C459"/>
    <ellipse cx="40" cy="24" rx="16" ry="6" fill="#C0DD97"/>
    <rect x="32" y="30" width="6" height="14" rx="3" fill="#EAF3DE" opacity="0.5"/>
  </g>

  <!-- Sise -->
  <g class="sise">
    <ellipse cx="90" cy="54" rx="10" ry="4" fill="#3B6D11"/>
    <rect x="80" y="16" width="20" height="38" rx="5" fill="#639922"/>
    <ellipse cx="90" cy="16" rx="10" ry="4" fill="#3B6D11"/>
    <rect x="84" y="10" width="12" height="8" rx="3" fill="#3B6D11"/>
    <rect x="86" y="22" width="6" height="20" rx="3" fill="#C0DD97" opacity="0.4"/>
  </g>

  <!-- Kutu -->
  <g class="kutu">
    <ellipse cx="138" cy="34" rx="16" ry="5" fill="#EF9F27"/>
    <rect x="122" y="34" width="32" height="22" rx="3" fill="#BA7517"/>
    <line x1="122" y1="46" x2="154" y2="46" stroke="#854F0B" stroke-width="1.5"/>
    <rect x="130" y="37" width="8" height="8" rx="2" fill="#EF9F27" opacity="0.35"/>
  </g>

  <!-- Kese -->
  <g class="kese">
    <path d="M170 56 Q167 34 180 26 Q193 34 190 56 Z" fill="#C0DD97"/>
    <ellipse cx="180" cy="56" rx="11" ry="4" fill="#97C459"/>
    <line x1="180" y1="26" x2="180" y2="18" stroke="#639922" stroke-width="2" stroke-linecap="round"/>
    <circle cx="180" cy="16" r="3" fill="#639922"/>
  </g>

  <!-- AI badge -->
  <g class="badge">
    <circle cx="198" cy="30" r="9" class="pulser" fill="#EF9F27" opacity="0.25"/>
    <rect x="184" y="22" width="30" height="16" rx="8" fill="#BA7517"/>
    <text x="199" y="34" class="sub" font-size="9" font-weight="700" fill="#FFF5E0" text-anchor="middle">AI</text>
  </g>

  <!-- Wordmark -->
  <text x="140" y="100" class="wm word1" font-size="16" font-weight="700" fill="#1C1A15" text-anchor="middle">Esnaf Tezgah&#305;</text>
  <text x="140" y="112" class="sub word2" font-size="8" fill="#9B8E7A" text-anchor="middle" letter-spacing="1.5">AI OPERASYON PLATFORMU</text>
</svg>
